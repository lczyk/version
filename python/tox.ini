[tox]
min_version = 4.0
env_list =
    py314
    py313
    py312
    py311
    py310
    py39
    format

[testenv]
uv_resolution = lowest-direct
dependency_groups = dev
package = wheel
commands =
    pytest
    mypy

[testenv:format]
dependency_groups = dev
package = wheel
commands =
    ruff format --check ./version
    ruff check ./version
